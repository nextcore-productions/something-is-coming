<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Something is Coming</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    font-family: Arial, Helvetica, sans-serif;
    cursor: none;
  }

  #countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 4rem;
    letter-spacing: 2px;
    z-index: 10;
    text-align: center;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    display: block;
  }
</style>
</head>
<body>

<div id="countdown">--:--:--:--</div>
<canvas id="bubbleCanvas"></canvas>

<script>

const targetDate = new Date(Date.UTC(2026, 3, 5, 0, 0, 0));
function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;
    if (diff <= 0) {
        document.getElementById("countdown").innerText = "00:00:00:00";
        return;
    }
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60)) % 24);
    const minutes = Math.floor((diff/(1000*60)) % 60);
    const seconds = Math.floor((diff/1000) % 60);
    const format = n => n.toString().padStart(2,"0");
    document.getElementById("countdown").innerText =
        `${format(days)}:${format(hours)}:${format(minutes)}:${format(seconds)}`;
}
setInterval(updateCountdown,1000);
updateCountdown();


const canvas = document.getElementById('bubbleCanvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
});

let mouse = {x: W/2, y: H/2};
let mouseActive = false;
let lastMoveTime = Date.now();

window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouseActive = true;
    lastMoveTime = Date.now();
});


document.addEventListener('visibilitychange', () => {
    if(document.hidden) mouseActive = false;
});

class Bubble {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 6 + 2;
        this.speed = Math.random() * 1 + 0.2;
        this.angle = Math.random() * Math.PI * 2;
    }
    draw() {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
    }
    update() {

        const active = mouseActive && (Date.now() - lastMoveTime < 2000);

        if(active) {
      
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            this.x += dx * 0.01;
            this.y += dy * 0.01;
        } else {
            // ff
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
            this.angle += 0.01;
        }


        if(this.x < 0) this.x = W;
        if(this.x > W) this.x = 0;
        if(this.y < 0) this.y = H;
        if(this.y > H) this.y = 0;
    }
}

const bubbles = [];
for(let i=0;i<80;i++){bubbles.push(new Bubble());}

function animate(){
    ctx.clearRect(0,0,W,H);
    bubbles.forEach(b=>{
        b.update();
        b.draw();
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
